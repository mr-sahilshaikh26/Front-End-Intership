  <body>
    <div id="main">
      <div id="form">
        <h2>Create New Profile</h2>
        <p>Fill in the details to add a new user profile</p>
        <form>
          <label for=" name"> Full Name</label>
          <br />
          <input type="text" placeholder="Enter Full Name" id="name" />
          <br /><br />

          <label for=" Age"> Age</label>
          <br />
          <input type="number" placeholder="Enter Age" id="age" />
          <br />
          <br />
          <label for=" profession"> Profession</label>
          <br />
          <input type="text" placeholder="Enter Profession" id="profession" />
          <br /><br />

          <label for=" city"> City</label>
          <br />
          <input type="text" placeholder="Enter City" id="city" />
          <br /><br />

          <label for="image"> Profile image URL</label>
          <br />
          <input type="text" placeholder="Enter Image URL" id="profileimage" />
          <br /><br />

          <label for="Bio"> Bio</label>
          <br />
          <textarea
            id="bio"
            rows="5px"
            cols="40px"
            id="bio"
            placeholder="Write a short bio about the user ..."
          ></textarea>
          <br />
          <br />
          <button type="submit" id="submit">+ Add Profile</button>
          <br />
          <button id="btn-2">Reset Form</button>
        </form>
      </div>
