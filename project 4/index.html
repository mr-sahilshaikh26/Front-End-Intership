<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tech Conference 2025- Event Registration Form</h1>
    <h3> Please fill out the form carefully to comeplete your registration.</h3>
    <form> 
<fieldset> 
    <legend>Personal Information </legend>
    <table>
        <tr>
            <td><label for="Name">Name:</label></td>
            <td><input type="text" placeholder="Enter your Name " required></td>
        </tr>
       <tr>  <td><label for="email">Email Address:</label></td>
         <td><input type="email"placeholder="Enter your email"></td>  </tr> 
         <tr>
            <td><label for="number">Phone Number :</label></td>
            <td><input type="tel" placeholder="Enter your Phone number" maxlength="10"></td>
         </tr>
         <tr>
            <td><label for="Address">Address:</label></td>
            <td><textarea name="Address" id="" cols="30" rows="1" placeholder="Enter your Address"></textarea></td>
         </tr>
          </table>
    </fieldset>

<fieldset>
    <legend>Professional Information</legend>
    <label for="Occupation">Occupation:</label>
    <select>
        <option value="Select your Occupation">Select your Occupation</option>
        <option value="Software Engg">Software Engg</option>
        <option value="Civil Engg">Civil Engg</option>
        <option value="Computer Engg">Computer Engg</option>
    </select>
    <br><br>
    <label for="Expirence level">Expirence level:</label>
        <input type="radio" name="Expirence level" id="Fresher">
        <label for="Fresher">Fresher</label>
        <input type="radio" name="Expirence level" id="intermediate">
        <label for="intermediate">intermediate</label>
        <input type="radio" name="Expirence level" id="Expert">
        <label for="Expert">Expert</label>
        <br><br>
        <label for="Skills(Select all that apply)">Skills(Select all that apply)</label>
        <input type="checkbox" name="skills" id="skills">
        <label for="skills">Html</label>
        <input type="checkbox" name=" Skills" id="Skills">
        <label for="java script">java script</label>
        <input type="checkbox" name="skills" id="CSS">
        <label for="CSS">CSS</label>
        <input type="checkbox" name="" id="Node.js">
        <label for="Node.js">Node.js</label>
        <input type="checkbox" name="" id="python">
        <label for="python">Python</label>
        <input type="checkbox" name="" id="Next.js">
        <label for="Next.js">Next.js</label>
        <br><br>
        <label for="">Current Organizatio / Collage:</label>
        <input type="text" name="" id="" placeholder="Enter organization or Collage">        
</fieldset>
<fieldset>
    <legend>Additional Details</legend>
    <label for="">Upload Profile Photo:</label>
    <input type="file">
    <br><br>
    <label for="">Prerferred Event Date: </label>
    <input type="date" name="" id="">
    <br><br>
    <label for="">Why do you want to attend this event?:</label>
    <br>
 <textarea  cols="50" id="" placeholder="Write your answer here..."></textarea>
 <br><br>
 <label for="">how did you hear about us ?:</label>
<select >
    <option value="Select an option ">Select an option</option>
</select>
</fieldset>
<fieldset>
    <legend>Terms & conditions 
    </legend>
    <input type="checkbox" name="" id="" required>
    <label for="">I agree to the Terms & conditions and privary Policy </label>
</fieldset>
 <br>
<button type="submit">Registration</button>
&nbsp;
<button type="reset">reset</button>
    </form>
</body>
</html>
